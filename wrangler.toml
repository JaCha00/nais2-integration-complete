name = "nais-transfer-executor"
main = "cloudflare/nais-transfer-worker/src/index.ts"
compatibility_date = "2026-07-15"

[[durable_objects.bindings]]
name = "TRANSFER_STATE"
class_name = "TransferStateObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TransferStateObject"]

[[r2_buckets]]
binding = "PRIME"
bucket_name = "prime"

[vars]
R2_PREFIX = "nais"
