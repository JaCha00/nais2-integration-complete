[package]
name = "plist"
version = "1.9.0"
authors = ["Ed Barnard <eabarnard@gmail.com>"]
description = "A rusty plist parser. Supports Serde serialization."
license = "MIT"
repository = "https://github.com/ebarnard/rust-plist/"
documentation = "https://docs.rs/plist/"
keywords = ["plist", "parser"]
categories = ["config", "encoding", "parser-implementations"]
edition = "2021"
rust-version = "1.88.0"
exclude = ["/tests/data"]

[features]
default = ["serde"]
enable_unstable_features_that_may_break_with_minor_version_bumps = []

[dependencies]
base64 = "0.22.0"
time = { version = "0.3.47", features = ["parsing", "formatting"] }
indexmap = "2.1.0"
# NAIS patch: quick-xml 0.39.x is covered by RUSTSEC-2026-0194.
# plist 1.9.0 compiles cleanly against 0.41.x, so this local patch removes the
# vulnerable parser from Tauri's dependency graph while keeping plist's API.
quick_xml = { package = "quick-xml", version = "0.41.0" }
serde = { version = "1.0.2", optional = true }

[dev-dependencies]
serde_derive = { version = "1.0.2" }
serde_yaml = "0.8.21"
trybuild = { version = "1.0.116", features = ["diff"] }
macrotest = "1.2.1"

